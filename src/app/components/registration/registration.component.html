<div class="page-wrapper">
  <div class="card">

    <div class="brand">
      <iconify-icon icon="lucide:package-2" style="font-size: 24px; color: var(--primary)"></iconify-icon>
      <span class="brand-name">SmartStock</span>
    </div>

    <h1 class="title">Create account</h1>
    <p class="subtitle">Fill in the details to get started</p>

    <form class="form" (ngSubmit)="onSubmit()" #registerForm="ngForm">

      <div class="field" [class.filled]="name">
        <iconify-icon icon="lucide:user" class="field-icon"></iconify-icon>
        <input type="text" name="name" [(ngModel)]="name" required placeholder="Full name" class="field-input" />
      </div>

      <div class="field" [class.filled]="phone">
        <iconify-icon icon="lucide:smartphone" class="field-icon"></iconify-icon>
        <input type="tel" name="phone" [(ngModel)]="phone" required placeholder="Phone number" class="field-input" />
      </div>

      <div class="field" [class.filled]="email">
        <iconify-icon icon="lucide:mail" class="field-icon"></iconify-icon>
        <input type="email" name="email" [(ngModel)]="email" required email placeholder="Email address" class="field-input" />
      </div>

      <div class="field" [class.filled]="shopName">
        <iconify-icon icon="lucide:store" class="field-icon"></iconify-icon>
        <input type="text" name="shopName" [(ngModel)]="shopName" required placeholder="Shop name" class="field-input" />
      </div>

      <div class="field" [class.filled]="businessType">
        <iconify-icon icon="lucide:briefcase" class="field-icon"></iconify-icon>
        <select name="businessType" [(ngModel)]="businessType" required class="field-input select-input">
          <option value="" disabled selected>Business type</option>
          <option value="retail">Retail</option>
          <option value="wholesale">Wholesale</option>
          <option value="service">Service</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="field" [class.filled]="password">
        <iconify-icon icon="lucide:lock" class="field-icon"></iconify-icon>
        <input type="password" name="password" [(ngModel)]="password" required placeholder="Password" class="field-input" />
      </div>

      <div class="field" [class.filled]="confirmPassword" [class.error-field]="confirmPassword && password !== confirmPassword">
        <iconify-icon icon="lucide:shield-check" class="field-icon"></iconify-icon>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required placeholder="Confirm password" class="field-input" />
      </div>

      <button type="submit" class="submit-btn" [disabled]="!registerForm.form.valid || password !== confirmPassword || isLoading">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading" class="loading-content">
          <span class="spinner"></span>
          Creating account...
        </span>
      </button>

      <div class="success-msg" *ngIf="successMessage">
        <iconify-icon icon="lucide:check-circle" style="font-size:15px"></iconify-icon>
        {{ successMessage }}
      </div>

      <div class="error-msg" *ngIf="errorMessage">
        <iconify-icon icon="lucide:alert-circle" style="font-size:15px"></iconify-icon>
        {{ errorMessage }}
      </div>

      <div class="error-msg" *ngIf="confirmPassword && password !== confirmPassword">
        <iconify-icon icon="lucide:alert-circle" style="font-size:15px"></iconify-icon>
        Passwords do not match
      </div>

    </form>

    <div class="footer">
      Already have an account? <span class="link" (click)="navigateTo('login')">Sign in</span>
    </div>

  </div>
</div>
