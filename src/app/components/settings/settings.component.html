<header>
  <div class="header-left">
    <div class="header-title">Settings</div>
    <div class="header-subtitle">Manage your app preferences</div>
  </div>
</header>

<main>
  <div class="profile-section">
    <div class="profile-avatar">
      <img
        src="https://storage.googleapis.com/banani-avatars/avatar%2Fmale%2F35-50%2FSouth%20Asian%2F1"
        alt="User Profile"
      />
    </div>
    <div class="profile-info">
      <div class="profile-name">{{ userName }}</div>
      <div class="profile-role">{{ shopName }}</div>
    </div>
    <div class="edit-btn">Edit</div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">Preferences</div>
    <div class="settings-card">
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-icon blue">
            <iconify-icon icon="lucide:languages" style="font-size: 18px"></iconify-icon>
          </div>
          <div class="settings-label">Language</div>
        </div>
        <div class="settings-value">
          English
          <iconify-icon icon="lucide:chevron-right" style="font-size: 16px"></iconify-icon>
        </div>
      </div>
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-icon orange">
            <iconify-icon icon="lucide:bell" style="font-size: 18px"></iconify-icon>
          </div>
          <div class="settings-label">Notifications</div>
        </div>
        <div class="settings-value">
          <div class="switch"></div>
        </div>
      </div>
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-icon">
            <iconify-icon icon="lucide:alert-triangle" style="font-size: 18px"></iconify-icon>
          </div>
          <div class="settings-label">Low Stock Threshold</div>
        </div>
        <div class="settings-value">
          5 items
          <iconify-icon icon="lucide:chevron-right" style="font-size: 16px"></iconify-icon>
        </div>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">Integrations &amp; Export</div>
    <div class="settings-card">
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-icon green">
            <iconify-icon icon="lucide:file-spreadsheet" style="font-size: 18px"></iconify-icon>
          </div>
          <div class="settings-label">Tally Export Settings</div>
        </div>
        <div class="settings-value">
          <iconify-icon icon="lucide:chevron-right" style="font-size: 16px"></iconify-icon>
        </div>
      </div>
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-icon green">
            <iconify-icon icon="lucide:file-down" style="font-size: 18px"></iconify-icon>
          </div>
          <div class="settings-label">Auto-Backup to Cloud</div>
        </div>
        <div class="settings-value">
          <div class="switch"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">Other</div>
    <div class="settings-card">
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-icon">
            <iconify-icon icon="lucide:help-circle" style="font-size: 18px"></iconify-icon>
          </div>
          <div class="settings-label">Help &amp; Support</div>
        </div>
      </div>
      <div class="settings-item" (click)="logout()" style="cursor: pointer;">
        <div class="settings-item-left">
          <div class="settings-icon red">
            <iconify-icon icon="lucide:log-out" style="font-size: 18px"></iconify-icon>
          </div>
          <div class="settings-label" style="color: var(--destructive, #ef4444)">
            Log Out
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<nav>
  <a class="nav-item" routerLink="/home" routerLinkActive="active">
    <iconify-icon icon="lucide:layout-dashboard" style="font-size: 24px"></iconify-icon>
    <div class="nav-label">Home</div>
  </a>
  <a class="nav-item" routerLink="/inventory" routerLinkActive="active">
    <iconify-icon icon="lucide:package-search" style="font-size: 24px"></iconify-icon>
    <div class="nav-label">Inventory</div>
  </a>
  <a class="nav-item" routerLink="/reports" routerLinkActive="active">
    <iconify-icon icon="lucide:file-text" style="font-size: 24px"></iconify-icon>
    <div class="nav-label">Reports</div>
  </a>
  <a class="nav-item" routerLink="/settings" routerLinkActive="active">
    <iconify-icon icon="lucide:settings" style="font-size: 24px"></iconify-icon>
    <div class="nav-label">Settings</div>
  </a>
</nav>
