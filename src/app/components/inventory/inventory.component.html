<header>
  <div class="header-left">
    <div class="header-title">Inventory</div>
  </div>
  <div class="header-actions">
    <div class="icon-btn">
      <iconify-icon icon="lucide:file-down" style="font-size: 18px"></iconify-icon>
    </div>
    <div class="icon-btn">
      <iconify-icon icon="lucide:filter" style="font-size: 18px"></iconify-icon>
    </div>
  </div>
</header>

<main>
  <div class="search-container">
    <div style="width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--muted-foreground, #71717a);">
      <iconify-icon icon="lucide:search" style="font-size: 20px"></iconify-icon>
    </div>
    <input type="text" class="search-input" placeholder="Search items, SKU, or categories..." (input)="onSearch($event)">
    <div style="width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--muted-foreground, #71717a); cursor: pointer;">
      <iconify-icon icon="lucide:barcode" style="font-size: 20px"></iconify-icon>
    </div>
  </div>

  <div class="tabs-container">
    <div class="tab active">All Items</div>
    <div class="tab inactive">Low Stock ({{ getLowStockCount() }})</div>
  </div>

  <div class="inventory-header">
    <div class="inventory-title">All Items</div>
    <div class="inventory-count">{{ filteredProducts.length }} items</div>
  </div>

  <div class="inventory-list">
    <div class="inventory-item" *ngFor="let product of filteredProducts">
      <div class="item-img">
        <iconify-icon icon="lucide:package" style="font-size: 24px"></iconify-icon>
      </div>
      <div class="item-info">
        <div class="item-name">{{ product.name }}</div>
        <div class="item-meta">
          <span>ID: {{ product.id }}</span>
          <span>•</span>
          <span>Min: {{ product.threshold }}</span>
        </div>
      </div>
      <div class="item-status">
        <div class="item-price">₹{{ product.price.toFixed(2) }}</div>
        <div class="stock-badge" [class.low]="isLowStock(product)">{{ product.stockLevel }} in stock</div>
      </div>
    </div>

    <div *ngIf="filteredProducts.length === 0" style="text-align: center; padding: 40px; color: #71717a;">
      <iconify-icon icon="lucide:package-x" style="font-size: 48px; margin-bottom: 16px;"></iconify-icon>
      <p>No products found</p>
    </div>
  </div>
</main>

<div class="fab">
  <iconify-icon icon="lucide:plus" style="font-size: 24px"></iconify-icon>
</div>

<nav>
  <a class="nav-item" routerLink="/home" routerLinkActive="active">
    <iconify-icon icon="lucide:layout-dashboard" style="font-size: 24px"></iconify-icon>
    <div class="nav-label">Home</div>
  </a>
  <a class="nav-item" routerLink="/inventory" routerLinkActive="active">
    <iconify-icon icon="lucide:package-search" style="font-size: 24px"></iconify-icon>
    <div class="nav-label">Inventory</div>
  </a>
  <a class="nav-item" routerLink="/reports" routerLinkActive="active">
    <iconify-icon icon="lucide:file-text" style="font-size: 24px"></iconify-icon>
    <div class="nav-label">Reports</div>
  </a>
  <a class="nav-item" routerLink="/settings" routerLinkActive="active">
    <iconify-icon icon="lucide:settings" style="font-size: 24px"></iconify-icon>
    <div class="nav-label">Settings</div>
  </a>
</nav>
